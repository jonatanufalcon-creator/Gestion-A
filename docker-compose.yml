version: '3.8'\n\nservices:\n  db:\n    image: postgres:latest\n    restart: always\n    environment:\n      POSTGRES_USER: your_user\n      POSTGRES_PASSWORD: your_password\n      POSTGRES_DB: your_database\n    volumes:\n      - db_data:/var/lib/postgresql/data\n    networks:\n      - app-network\n\n  backend:\n    build:\n      context: ./backend\n      dockerfile: Dockerfile\n    restart: always\n    ports:\n      - "5000:5000"  # Adjust these if your backend uses a different port\n    environment:\n      DATABASE_URL: postgres://your_user:your_password@db:5432/your_database\n    depends_on:\n      - db\n    networks:\n      - app-network\n\n  frontend:\n    build:\n      context: ./frontend\n      dockerfile: Dockerfile\n    restart: always\n    ports:\n      - "3000:3000"  # Adjust these if your frontend uses a different port\n    depends_on:\n      - backend\n    networks:\n      - app-network\n\nnetworks:\n  app-network:\n    driver: bridge\n\nvolumes:\n  db_data: